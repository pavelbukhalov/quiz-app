<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp - Интерактивные квизы</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>QuizApp</h1>
            <p class="subtitle">Интерактивные квизы в реальном времени</p>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form id="register-form" class="auth-form">
                <input type="text" id="register-username" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <select id="register-role">
                    <option value="participant">Участник</option>
                    <option value="organizer">Организатор</option>
                </select>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>

            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
